name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # On pull requests, use the contributor's head commit rather than GitHub's
      # synthetic merge commit. Only that ref's two most recent commits are fetched.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install -E
      - name: Unit tests (blocks pipeline on failure)
        run: bun run test
      - run: python3 -m py_compile scripts/options-data.py
      - run: node --check scripts/options-cloudflare-proxy.js
      - run: bun run build
      - run: bun run build-github-pages
  npm-check-updates:
    runs-on: ubuntu-latest
    steps:
      # On pull requests, use the contributor's head commit rather than GitHub's
      # synthetic merge commit. Only that ref's two most recent commits are fetched.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bunx npm-check-updates -u
      - run: bun install
      - run: bun run test
      - run: bun run build
      - run: bun run clean
      - run: bun run build-github-pages
